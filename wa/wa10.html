<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../css/wa10.css">
    <script defer src="../js/wa10.js"></script>

    <title>Silly story generator</title>
</head>
<body>
    <div id="form">
        <div class="input">
            <label for="customname1">Enter custom name 1:</label>
            <input id="customname1" type="text" placeholder="" />
        </div>
        <div class="input">
            <label for="customname2">Enter custom name 2:</label>
            <input id="customname2" type="text" placeholder="" />
        </div>
        <div class="input">
            <label for="place">Enter place name:</label>
            <input id="place" type="text" placeholder="" />
        </div>
        <div class="input">
            <label for="happening">Enter something that happened:</label>
            <input id="happening" type="text" placeholder="" />
        </div>
        <div id="region">
            <label for="us">US</label
                ><input id="us" type="radio" name="ukus" value="us" checked />
            <label for="uk">UK</label
                ><input id="uk" type="radio" name="ukus" value="uk" />
        </div>
        <button class="randomize">Generate random story</button>
    </div>
    <!-- Thanks a lot to Willy Aguirre for his help with the code for this assessment -->
    <p class="story"></p>
  </body>
</html>
